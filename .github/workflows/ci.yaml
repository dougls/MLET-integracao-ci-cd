# Workflow
name: CI - MLOps

# conditions
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Variables
env:
  PYTHON_VERSION: '3.6.15'

# jobs
jobs:
  validacao-ambiente:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Run script validation
        run: python validate_env.py
