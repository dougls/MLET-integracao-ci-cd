# Workflow
name: CI - MLOps

# conditions
on:
  pull_request:
    branches:
      - main

# Variables
env:
  PYTHON_VERSION: '3.10'

# jobs
jobs:
  validacao-ambiente:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Install Poetry
        run: pip install poetry

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'poetry'
      
      - name: Run script validation
        run: python validate_env.py
      
      - name: Install nbstripout
        run: pip install nbstripout

      - name: Analyse Notebooks
        run: |
          nbstripout --verify explorer.ipynb || (echo "ERRO: Notebook com outputs, limpe antes de commitar" && exit code 1)

      - name: Install Ruff (Linter)
        run: pip install ruff

      - name: Run Linter
        run: ruff check .

      - name: Install dependencies - Poetry
        run: poetry install

      - name: Rodar ETL (preparar-dados)
        run: poetry run python src/models/preparar-dados.py

      - name: Dummy Training - Poetry
        run: poetry run python dummy_train.py

      - name: Dummy Training Governance - Poetry
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: poetry run python dummy_train_governance.py

      - name: Tests (PyTest)
        run: poetry run python -m pytest tests/ -v

      - name: Treinar modelo (pkl)
        run: python train.py

      - name: Rodar auditoria MLOps
        uses: dougls/MLET-integracao-ci-cd-devops@main
        with:
          path-model: 'outputs/modelo_fraude.pkl'
          nivel_alerta: 'WARNING'

        