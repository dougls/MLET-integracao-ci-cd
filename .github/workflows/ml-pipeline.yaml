name: Pipeline de treinamento ML

on:
  push:
    branches:
      - main

env:
  PYTHON_VERSION: '3.10'

jobs:
  preparando-dados:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install poetry
        run: pip install poetry

      - name: Install python version ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'poetry'
      
      - name: Install dependencies - Poetry
        run: poetry install

      - name: Rodar ETL (preparar-dados)
        run: poetry run python preparar-dados.py

      - name: Salvar dataset como artefato
        uses: actions/upload-artifact@v7
        with:
          name: dataset
          path: dataset_processado.csv
  treinamento:
    needs: preparando-dados
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download do artefato
        uses: actions/download-artifact@v7
        with:
          name: dataset

      - name: Verificar download artifact
        run: |
          echo "Conteúdo do diretório atual:"
          ls -la
          echo "Lendo as primeiras linhas do CSV chamado dataset:"
          cat dataset_processado.csv

      